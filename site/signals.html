<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Signals — TVEVT</title>
<link rel="icon" href="/assets/brand/tvevt-favicon.svg" type="image/svg+xml">

<style>
:root{
  --bg:#09090b;
  --panel:#141416;
  --line:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:#a7a7ad;
  --orange:#ff9b3d;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,155,61,.16), transparent 32%),
    var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:40px 24px 80px;
}

h1{
  margin:0 0 10px;
  font-size:40px;
}

p{
  color:var(--muted);
}

.list{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.item{
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  background:rgba(20,20,22,.85);
}

.item small{
  display:block;
  color:var(--muted);
  margin-bottom:6px;
}

.item strong{
  display:block;
  line-height:1.4;
}

.empty{
  margin-top:40px;
  padding:24px;
  border:1px solid var(--line);
  border-radius:20px;
  background:rgba(20,20,22,.7);
}

</style>
</head>

<body>

<script src="/assets/private-nav.js?v=2026-05-04"></script>

<div class="wrap">

  <h1>My Signals</h1>
  <p>Your private signal library.</p>

  <div id="list" class="list"></div>

  <div id="empty" class="empty" style="display:none">
    No signals yet.
  </div>

</div>

<script>
const key = localStorage.getItem("tvevt_client_key") || "default";
const storageKey = "tvevt_signals_" + key;

const list = document.getElementById("list");
const empty = document.getElementById("empty");

const signals = JSON.parse(localStorage.getItem(storageKey) || "[]");

if (!signals.length) {
  empty.style.display = "block";
} else {
  signals.reverse().forEach(s => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <small>${new Date(s.time).toLocaleString()}</small>
      <strong>${s.text}</strong>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
