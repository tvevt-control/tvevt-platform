<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TVEVT Signals</title>

<style>
body{margin:0;background:#0b0b0c;color:#fff;font-family:Arial;padding:40px}
h1{margin-bottom:10px}
input{width:100%;padding:14px;border-radius:10px;border:1px solid #333;background:#141416;color:#fff;margin-bottom:20px}
.card{background:#141416;padding:15px;border-radius:10px;margin-bottom:15px}
small{color:#aaa}
button{margin-top:10px;margin-right:10px;padding:10px;border:none;border-radius:8px;background:#ff9b3d;color:#000;cursor:pointer}
.error{color:#ff5a5a}
</style>
</head>

<body>

<h1>TVEVT Signals</h1>
<p>Private signal library.</p>

<input id="search" placeholder="Search by ID, text, date..." oninput="load()">

<div id="list"></div>

<script>
async function load() {
  const params = new URLSearchParams(location.search);
  const key = params.get("key") || "";
  const q = document.getElementById("search").value;

  const res = await fetch(`/api/signals?key=${key}&q=${encodeURIComponent(q)}`);

  if (!res.ok) {
    document.getElementById("list").innerHTML =
      '<div class="error">Unauthorized or unable to load signals.</div>';
    return;
  }

  const data = await res.json();

  document.getElementById("list").innerHTML = data.map(s => `
    <div class="card">
      <small>${s.id} | ${s.timestamp} | ${s.status}</small>
      <div>${s.text}</div>
      <button onclick="openLink('${s.link}')">Open</button>
      <button onclick="copyLink('${s.link}')">Copy</button>
    </div>
  `).join("");
}

function openLink(link) {
  window.open(link, "_blank");
}

function copyLink(link) {
  navigator.clipboard.writeText(location.origin + link);
}

load();
</script>

</body>
</html>
