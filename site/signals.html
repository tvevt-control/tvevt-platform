<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Signals — TVEVT</title>
<link rel="icon" href="/assets/brand/tvevt-favicon.svg" type="image/svg+xml">

<style>
:root{
  --bg:#09090b;
  --panel:#141416;
  --line:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:#a7a7ad;
  --orange:#ff9b3d;
  --green:#2cff9a;
  --red:#ff6a5f;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,155,61,.16), transparent 32%),
    var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:34px 24px 80px;
}

.modeBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:22px;
  border:1px solid rgba(44,255,154,.22);
  border-radius:20px;
  padding:16px 18px;
  background:rgba(44,255,154,.06);
}

.modeBar strong{
  display:block;
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--green);
}

.modeBar span{
  display:block;
  margin-top:5px;
  color:var(--muted);
  font-size:14px;
}

.modeActions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.topBtn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:#fff;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  text-decoration:none;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.hero,.item,.empty{
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(20,20,22,.88);
  padding:24px;
}

h1{
  margin:0 0 10px;
  font-size:40px;
  letter-spacing:-.04em;
}

p{
  color:var(--muted);
  line-height:1.6;
}

.list{
  margin-top:24px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.item small{
  display:block;
  color:var(--muted);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-weight:900;
  font-size:11px;
}

.item strong{
  display:block;
  line-height:1.5;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  margin-bottom:14px;
}

.meta{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
  word-break:break-all;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
  flex-wrap:wrap;
}

.btn{
  padding:11px 14px;
  border-radius:12px;
  background:var(--orange);
  color:#000;
  font-weight:900;
  text-decoration:none;
  border:0;
  cursor:pointer;
  font-size:13px;
}

.btn.secondary{
  background:transparent;
  color:#fff;
  border:1px solid var(--line);
}

.empty{
  margin-top:24px;
  color:var(--muted);
}

.msg{
  margin-top:16px;
  color:var(--green);
  font-weight:800;
}

.msg.error{
  color:var(--red);
}

footer{
  margin-top:40px;
  text-align:center;
  color:rgba(255,255,255,.24);
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
}

@media(max-width:800px){
  .modeBar{
    flex-direction:column;
    align-items:flex-start;
  }

  h1{
    font-size:34px;
  }

  .btn{
    width:100%;
    text-align:center;
  }
}
</style>
</head>

<body>

<script src="/assets/private-nav.js?v=2026-05-10"></script>

<div class="wrap">

  <div id="modeBar" class="modeBar">
    <div>
      <strong>Private Signal Library</strong>
      <span id="modeText">Loading private identity…</span>
    </div>

    <div class="modeActions">
      <a class="topBtn" id="consoleLink" href="/console.html">Console</a>
      <a class="topBtn" id="createLink" href="/seal.html">Create Signal</a>
      <a class="topBtn" href="/">Public Site</a>
    </div>
  </div>

  <section class="hero">
    <h1>My Signals</h1>
    <p>
      Your private verified signal library. Every signal opens as a TVEVT verification record.
    </p>
    <div id="msg" class="msg"></div>
  </section>

  <div id="list" class="list"></div>

  <div id="empty" class="empty" style="display:none">
    No private signals found yet.
  </div>

  <footer>
    Say it once. Prove it forever.
  </footer>

</div>

<script>
const params = new URLSearchParams(window.location.search);

let key =
  params.get("key") ||
  localStorage.getItem("tvevt_client_key") ||
  "";

const list = document.getElementById("list");
const empty = document.getElementById("empty");
const msg = document.getElementById("msg");
const modeText = document.getElementById("modeText");
const consoleLink = document.getElementById("consoleLink");
const createLink = document.getElementById("createLink");

function withKey(path){
  return key
    ? path + "?key=" + encodeURIComponent(key)
    : path;
}

function formatDate(value){
  if(!value) return "—";

  try{
    return new Date(value).toLocaleString();
  }catch{
    return value;
  }
}

function setMessage(text, error = false){
  msg.textContent = text || "";
  msg.classList.toggle("error", error);
}

function applyMode(){
  if(key){
    localStorage.setItem("tvevt_client_key", key);
    modeText.textContent = "Private identity active on this device.";
    consoleLink.href = withKey("/console.html");
    createLink.href = withKey("/seal.html");
  }else{
    modeText.textContent = "No private identity found.";
    consoleLink.href = "/request-access.html";
    consoleLink.textContent = "Request Access";
    createLink.href = "/seal.html";
  }
}

function normalizeRecords(data){
  if(Array.isArray(data)) return data;
  if(Array.isArray(data.records)) return data.records;
  if(Array.isArray(data.signals)) return data.signals;
  return [];
}

async function loadFromApi(){
  const res = await fetch(
    "/api/signals?key=" + encodeURIComponent(key)
  );

  const data = await res.json();

  if(!res.ok || data.ok === false){
    throw new Error(data.error || "Unable to load signals.");
  }

  return normalizeRecords(data);
}

function loadLocalFallback(){
  const storageKey = "tvevt_signals_" + (key || "default");
  return JSON.parse(localStorage.getItem(storageKey) || "[]");
}

function saveLocalFallback(records){
  if(!key || !Array.isArray(records)) return;

  const storageKey = "tvevt_signals_" + key;

  localStorage.setItem(
    storageKey,
    JSON.stringify(records)
  );
}

function render(records){
  list.innerHTML = "";

  if(!records.length){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  records
    .slice()
    .reverse()
    .forEach(record => {
      const id = record.id || record.signalId || "—";
      const text = record.text || record.content?.text || "No sealed text available.";
      const time = record.createdAt || record.timestamp || record.time || "";
      const hash = record.hash || "—";
      const status = record.anchor_status || record.status || "sealed";
      const visibility = record.visibility || "private";
      const url =
        record.recordUrl ||
        record.verification_url ||
        (id !== "—" ? "/record.html?id=" + encodeURIComponent(id) : "#");

      const div = document.createElement("div");
      div.className = "item";

      const label = document.createElement("small");
      label.textContent = `${id} · ${formatDate(time)}`;

      const body = document.createElement("strong");
      body.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `Status: ${status} · Visibility: ${visibility} · Hash: ${hash}`;

      const actions = document.createElement("div");
      actions.className = "actions";

      const open = document.createElement("a");
      open.className = "btn";
      open.href = url;
      open.textContent = "Open Record";

      const copy = document.createElement("button");
      copy.className = "btn secondary";
      copy.type = "button";
      copy.textContent = "Copy Link";

      copy.onclick = async () => {
        const full = url.startsWith("http")
          ? url
          : window.location.origin + url;

        await navigator.clipboard.writeText(full);
        setMessage("Verification link copied.");
      };

      actions.appendChild(open);
      actions.appendChild(copy);

      div.appendChild(label);
      div.appendChild(body);
      div.appendChild(meta);
      div.appendChild(actions);

      list.appendChild(div);
    });
}

async function init(){
  applyMode();

  if(!key){
    empty.style.display = "block";
    setMessage("Private access is required to load your signal library.", true);
    return;
  }

  setMessage("Loading private signal library…");

  try{
    const records = await loadFromApi();

    saveLocalFallback(records);
    render(records);

    setMessage("Signal library loaded.");
  }catch(err){
    console.error(err);

    const fallback = loadLocalFallback();

    if(fallback.length){
      render(fallback);
      setMessage("Loaded local fallback library.");
    }else{
      render([]);
      setMessage("No private records found yet.");
    }
  }
}

init();
</script>

</body>
</html>
