<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verified Archive — TVEVT</title>
<link rel="icon" href="/assets/brand/tvevt-favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #101419;
  --panel: #161B22;
  --panel2: #21262D;
  --line: #30363D;
  --text: #F0F6FC;
  --muted: #8B949E;
  --soft: rgba(240, 246, 252, 0.45);
  
  /* Тотальный фикс: переводим акцент в благородную нейтральную платину */
  --accent: #F0F6FC;
  --accent-muted: rgba(240, 246, 252, 0.1);
  
  --green: #00E699;
  --red: #FF4D4D;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.wrap {
  max-width: 1180px;
  margin: 0 auto;
  padding: 80px 24px 80px;
}

.hero, .item, .empty {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 32px;
}

h1 {
  margin: 0 0 12px;
  font-size: 36px;
  letter-spacing: -.02em;
  font-weight: 400;
}

p {
  color: var(--muted);
  line-height: 1.65;
  font-size: 15px;
}

.list {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.item {
  background: var(--panel);
  padding: 24px;
}

.item small {
  display: block;
  color: var(--muted);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: .05em;
  font-weight: 500;
  font-size: 11px;
  font-family: "JetBrains Mono", monospace;
}

.item strong {
  display: block;
  line-height: 1.6;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  margin-bottom: 16px;
  font-weight: 400;
  font-size: 16px;
  color: var(--text);
}

.meta {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
  word-break: break-all;
  font-family: "JetBrains Mono", monospace;
  background: var(--panel2);
  padding: 12px 16px;
  border-radius: 6px;
  border: 1px solid var(--line);
}

.actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 18px;
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  font-weight: 500;
  text-decoration: none;
  border: 1px solid var(--line);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: background .15s ease, border-color .15s ease;
}

.btn:hover {
  background: var(--panel2);
  border-color: var(--text);
}

.btn.secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--line);
}

.btn.secondary:hover {
  color: var(--text);
  border-color: var(--text);
  background: var(--panel2);
}

.empty {
  margin-top: 24px;
  color: var(--muted);
  text-align: center;
  padding: 48px;
  font-size: 15px;
}

.msg {
  margin-top: 16px;
  color: var(--green);
  font-family: "JetBrains Mono", monospace;
  font-size: 13px;
}

.msg.error {
  color: var(--red);
}

footer {
  margin-top: 64px;
  text-align: center;
  color: rgba(255, 255, 255, 0.15);
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  font-family: "JetBrains Mono", monospace;
}

@media(max-width:800px) {
  .wrap { padding: 96px 16px 60px; }
  h1 { font-size: 28px; }
  .btn { width: 100%; text-align: center; }
  .actions { flex-direction: column; }
}
</style>
</head>

<body>

<!-- ПОДКЛЮЧЕНИЕ КАНОНИЧНОЙ СВЕЖЕЙ НАВИГАЦИИ С АРХИВОМ -->
<script src="/assets/private-nav.js?v=2026-06-07-v5"></script>

<div class="wrap">

  <section class="hero">
    <h1>Verified Archive</h1>
    <p>
      Your private verified record library. Every entry opens as an immutable TVEVT verification record.
    </p>
    <div id="msg" class="msg"></div>
  </section>

  <div id="list" class="list"></div>

  <div id="empty" class="empty" style="display:none">
    No private records found yet.
  </div>

  <footer>
    Say it once. Prove it forever.
  </footer>

</div>

<script>
const params = new URLSearchParams(window.location.search);

let key =
  params.get("key") ||
  localStorage.getItem("tvevt_client_key") ||
  "";

const list = document.getElementById("list");
const empty = document.getElementById("empty");
const msg = document.getElementById("msg");

function withKey(path){
  return key ? path + "?key=" + encodeURIComponent(key) : path;
}

function formatDate(value){
  if(!value) return "—";
  try{
    return new Date(value).toLocaleString();
  }catch{
    return value;
  }
}

function setMessage(text, error = false){
  msg.textContent = text || "";
  msg.classList.toggle("error", error);
  if(!error && text) msg.style.color = "var(--green)";
}

function normalizeRecords(data){
  if(Array.isArray(data)) return data;
  if(Array.isArray(data.records)) return data.records;
  if(Array.isArray(data.signals)) return data.signals;
  return [];
}

async function loadFromApi(){
  const res = await fetch(
    "/api/signals?key=" + encodeURIComponent(key)
  );
  const data = await res.json();
  if(!res.ok || data.ok === false){
    throw new Error(data.error || "Unable to load records.");
  }
  return normalizeRecords(data);
}

function loadLocalFallback(){
  const storageKey = "tvevt_signals_" + (key || "default");
  return JSON.parse(localStorage.getItem(storageKey) || "[]");
}

function saveLocalFallback(records){
  if(!key || !Array.isArray(records)) return;
  const storageKey = "tvevt_signals_" + key;
  localStorage.setItem(storageKey, JSON.stringify(records));
}

function render(records){
  list.innerHTML = "";
  if(!records.length){
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  records
    .slice()
    .reverse()
    .forEach(record => {
      const id = record.id || record.signalId || "—";
      const text = record.text || record.content?.text || "No sealed text available.";
      const time = record.createdAt || record.timestamp || record.time || "";
      const hash = record.hash || "—";
      const status = record.anchor_status || record.status || "sealed";
      const visibility = record.visibility || "private";
      const url =
        record.recordUrl ||
        record.verification_url ||
        (id !== "—" ? "/record.html?id=" + encodeURIComponent(id) : "#");

      const div = document.createElement("div");
      div.className = "item";

      const label = document.createElement("small");
      label.textContent = `${id} · ${formatDate(time)}`;

      const body = document.createElement("strong");
      body.textContent = text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `Status: ${status} · Visibility: ${visibility} · Hash: ${hash}`;

      const actions = document.createElement("div");
      actions.className = "actions";

      const open = document.createElement("a");
      open.className = "btn";
      open.href = withKey(url);
      open.textContent = "Open Record";

      const copy = document.createElement("button");
      copy.className = "btn secondary";
      copy.type = "button";
      copy.textContent = "Copy Link";

      copy.onclick = async () => {
        const full = url.startsWith("http")
          ? url
          : window.location.origin + url;
        await navigator.clipboard.writeText(full);
        setMessage("Verification link copied.");
      };

      actions.appendChild(open);
      actions.appendChild(copy);

      div.appendChild(label);
      div.appendChild(body);
      div.appendChild(meta);
      div.appendChild(actions);

      list.appendChild(div);
    });
}

async function init(){
  if(key){
    localStorage.setItem("tvevt_client_key", key);
  }

  if(!key){
    empty.style.display = "block";
    setMessage("Private access is required to load your verified archive.", true);
    return;
  }

  setMessage("Loading verified archive…");

  try{
    const records = await loadFromApi();
    saveLocalFallback(records);
    render(records);
    setMessage("Verified archive loaded.");
  }catch(err){
    console.error(err);
    const fallback = loadLocalFallback();
    if(fallback.length){
      render(fallback);
      setMessage("Loaded local fallback archive.");
    }else{
      render([]);
      setMessage("No private records found yet.");
    }
  }
}

init();
</script>

</body>
</html>
