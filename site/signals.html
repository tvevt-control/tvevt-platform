<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TVEVT — Seal Signal</title>
<link rel="icon" href="/tvevt-favicon.svg">

<style>
body{margin:0;background:#0b0b0c;color:#fff;font-family:Arial,sans-serif;padding:40px}
h1{margin-bottom:10px}
textarea{width:100%;height:200px;padding:15px;border-radius:10px;border:1px solid #333;background:#141416;color:#fff}
button{margin-top:15px;padding:14px 20px;border:none;border-radius:10px;background:#ff9b3d;color:#000;font-weight:bold;cursor:pointer}
.result{margin-top:30px;padding:20px;background:#141416;border-radius:10px}
.field{margin-bottom:10px;font-size:14px}
small{color:#aaa}
</style>
</head>

<body>

<h1>Seal Signal</h1>

<textarea id="text" placeholder="Enter your statement..."></textarea>

<br>
<button onclick="seal()">Seal Signal</button>

<div id="result"></div>

<script>
async function seal() {
  const text = document.getElementById("text").value.trim();
  if (!text) return;

  const params = new URLSearchParams(location.search);
  const key = params.get("key") || "";

  const res = await fetch("/publish", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      text: text,
      key: key
    })
  });

  const data = await res.json();

  const link = data.verification_url || (location.origin + "/record.html?id=" + data.id);

  document.getElementById("result").innerHTML = `
    <div class="result">
      <div class="field"><small>Record ID</small><br>${data.id}</div>
      <div class="field"><small>Timestamp</small><br>${data.timestamp}</div>
      <div class="field"><small>Hash</small><br>${data.hash}</div>
      <div class="field"><small>Verification</small><br>${link}</div>
    </div>
  `;
}
</script>

</body>
</html>
