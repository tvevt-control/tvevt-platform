<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="color-scheme" content="dark"/>

  <title>TVEVT — Request Received</title>
  <meta name="description" content="Your TVEVT request has been received." />

  <link rel="icon" type="image/svg+xml" href="/assets/brand/tvevt-favicon.svg?v=2026-03-01">
  <link rel="shortcut icon" href="/assets/brand/tvevt-favicon.svg?v=2026-03-01">
  <meta name="theme-color" content="#0b0d10"/>

  <style>
    :root{
      --bg0:#07090c;
      --bg1:#0b0d10;
      --stroke: rgba(255,255,255,.12);
      --text:#eef2f6;
      --muted: rgba(238,242,246,.72);
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --orange1:#ff8a00;
      --orange2:#ff4d00;
      --radius: 18px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(255,138,0,.18), transparent 60%),
        radial-gradient(900px 600px at 85% 20%, rgba(255,77,0,.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    a{ color:inherit; text-decoration:none; }
    .wrap{ max-width:1120px; margin:0 auto; padding:18px 18px 70px; }

    .card{
      margin-top:18px;
      border-radius: var(--radius);
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding:26px 22px;
    }
    h1{ margin:0; font-size:34px; letter-spacing:-.6px; }
    p{ margin:10px 0 0; color:var(--muted); line-height:1.7; }
    .btn{
      display:inline-flex;
      margin-top:14px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      color:var(--text);
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main>
      <div class="card">
        <h1>Request received.</h1>
        <p>
          Thank you. Your access request has been submitted.
          If you need to add details, email <b>social@tvevt.com</b>.
        </p>
        <a class="btn" href="/index.html">Back to TVEVT</a>
      </div>
    </main>
  </div>

  <script src="/assets/nav.js?v=2026-03-01" defer></script>
</body>
</html>
