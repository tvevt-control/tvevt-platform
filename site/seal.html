<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVEVT | Seal Record</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { max-width: 600px; width: 90%; text-align: center; border: 1px solid #1a1a1a; padding: 60px 40px; border-radius: 4px; background: #050505; }
        
        .logo { width: 80px; margin-bottom: 40px; opacity: 1; filter: grayscale(100%); }
        
        h1 { font-weight: 400; letter-spacing: -0.05em; margin-bottom: 12px; font-size: 32px; color: #ffffff; }
        p { color: #555; font-size: 14px; margin-bottom: 40px; line-height: 1.6; text-transform: uppercase; letter-spacing: 0.1em; }
        
        textarea { width: 100%; height: 180px; background: #000; border: 1px solid #222; border-radius: 0; color: #fff; padding: 20px; font-size: 15px; resize: none; box-sizing: border-box; outline: none; transition: 0.2s; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
        textarea:focus { border-color: #fff; } 
        
        .btn { background: #fff; color: #000; border: 1px solid #fff; padding: 20px 50px; border-radius: 0; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 40px; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.2em; width: 100%; }
        .btn:hover { background: #000; color: #fff; }
        
        .footer-link { margin-top: 50px; display: block; color: #333; text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; transition: 0.3s; }
        .footer-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/tvevt-favicon.svg" alt="TVEVT Logo" class="logo">
        
        <h1>SAY IT ONCE. PROVE IT FOREVER.</h1>
        <p>Immutable Strategic Signal Ledger</p>
        
        <textarea id="msg" placeholder="ENTER YOUR STATEMENT..."></textarea>
        
        <button class="btn" onclick="sealIt()">Seal Record</button>
        
        <a href="index.html" class="footer-link">Archive / Vision</a>
    </div>

    <script>
        function sealIt() {
            const text = document.getElementById('msg').value;
            if(!text) return alert('Field is empty.');
            if(confirm('Final verification: This action is irreversible. Record this signal?')) {
                alert('TVEVT Alpha Protocol: Connection pending...');
            }
        }
    </script>
</body>
</html>
