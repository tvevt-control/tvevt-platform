<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVEVT | Seal Record</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { max-width: 600px; width: 90%; text-align: center; border: 1px solid #222; padding: 60px 40px; border-radius: 24px; background: linear-gradient(145deg, #0a0a0a, #111); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* Стили для логотипа */
        .logo { width: 120px; margin-bottom: 30px; opacity: 0.9; }
        
        h1 { font-weight: 300; letter-spacing: -1px; margin-bottom: 10px; font-size: 28px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        textarea { width: 100%; height: 160px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 20px; font-size: 16px; resize: none; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #ff4500; } /* Оранжевый акцент как на твоем сайте */
        
        .btn { background: #ff4500; color: #fff; border: none; padding: 18px 45px; border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 30px; transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 69, 0, 0.2); }
        .btn:hover { background: #ff5722; transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255, 69, 0, 0.3); }
        
        .footer-link { margin-top: 40px; display: block; color: #444; text-decoration: none; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/tvevt-favicon.svg" alt="TVEVT" class="logo">
        
        <h1>Say it once. Prove it forever.</h1>
        <p>Ваше сообщение будет запечатано в неизменяемый реестр TVEVT. <br>Это действие нельзя отменить.</p>
        
        <textarea id="msg" placeholder="Введите текст вашего заявления..."></textarea>
        
        <button class="btn" onclick="sealIt()">[ Seal Record ]</button>
        
        <a href="index.html" class="footer-link">Back to Vision</a>
    </div>

    <script>
        function sealIt() {
            const text = document.getElementById('msg').value;
            if(!text) return alert('Поле не может быть пустым.');
            if(confirm('Внимание: текст будет зафиксирован навсегда. Вы уверены?')) {
                alert('Инициализация протокола Alpha... (База данных будет подключена в следующем шаге)');
            }
        }
    </script>
</body>
</html>
