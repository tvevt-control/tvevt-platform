<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TVEVT | Governance Console</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/tvevt-favicon.svg" />
  <style>
    :root{ --bg:#000; --panel:#0a0a0a; --border:#1a1a1a; --text:#eee; --accent:#fff; }
    *{box-sizing:border-box}
    body{ margin:0; background:#000; color:var(--text); font-family:Inter, sans-serif; display:flex; height:100vh; overflow:hidden; }
    .console{ flex:1; display:flex; flex-direction:column; border:1px solid var(--border); margin:15px; border-radius:16px; background:var(--panel); }
    header{ height:70px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; padding:0 30px; }
    .brand{ display:flex; align-items:center; gap:12px; text-decoration:none; color:#fff; font-weight:700; }
    .brand img{ width:32px; height:32px; }
    .main-ui{ flex:1; display:flex; justify-content:center; align-items:center; padding:40px; position:relative; overflow-y:auto; }
    .terminal{ width:100%; max-width:700px; }
    label{ display:block; font-size:9px; text-transform:uppercase; letter-spacing:2px; color:#333; margin-bottom:10px; }
    textarea, input { 
      width:100%; background:#000; border:1px solid var(--border); padding:20px; color:#fff; 
      font-family:monospace; font-size:14px; margin-bottom:25px; outline:none; border-radius:4px;
    }
    textarea{ height:240px; resize:none; line-height:1.6; }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:25px; }
    .btn{ 
      width:100%; background:var(--accent); color:#000; padding:24px; border:none; 
      font-weight:800; text-transform:uppercase; letter-spacing:5px; cursor:pointer; transition:.3s;
    }
    .btn:hover{ background:#000; color:#fff; box-shadow:0 0 0 1px #fff; }
    footer{ height:45px; border-top:1px solid var(--border); display:flex; align-items:center; padding:0 30px; font-size:9px; color:#222; letter-spacing:2px; text-transform:uppercase; }
  </style>
</head>
<body>
  <div class="console">
    <header>
      <a href="index.html" class="brand">
        <img src="assets/brand/tvevt-favicon.svg" alt="TVEVT">
        <div>
          <div style="font-size:14px; letter-spacing:2px;">TVEVT</div>
          <div style="font-size:8px; font-weight:300; opacity:0.4;">Governance Console</div>
        </div>
      </a>
      <div style="font-size:9px; color:#222; letter-spacing:2px;">TERMINAL ACTIVE</div>
    </header>
    <div class="main-ui">
      <div class="terminal">
        <label>Strategic Signal Content</label>
        <textarea placeholder="Enter the text of your protocol or statement..."></textarea>
        <div class="grid">
          <div>
            <label>Originator Email</label>
            <input type="email" placeholder="you@company.com">
          </div>
          <div>
            <label>Recipient Email (Auto-Transmit)</label>
            <input type="email" placeholder="partner@company.com">
          </div>
        </div>
        <button class="btn">[ SEAL & TRANSMIT ]</button>
      </div>
    </div>
    <footer>Immutable Organizational Records Infrastructure</footer>
  </div>
</body>
</html>
