<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVEVT | Signal Input Terminal</title>
    <style>
        :root { --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --text: #eee; --accent: #fff; --input-bg: #111; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .console-wrapper { display: flex; flex-direction: column; width: 100%; border: 1px solid var(--border); margin: 15px; border-radius: 12px; background: var(--panel); position: relative; }
        
        /* Top Bar */
        .top-bar { height: 65px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .logo-section { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; }
        .logo-img { width: 32px; height: 32px; }
        .brand-name { font-weight: 600; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; }

        /* Terminal Body */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; position: relative; z-index: 2; overflow-y: auto; }
        .terminal-box { width: 100%; max-width: 700px; }
        
        h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #555; margin-bottom: 20px; text-align: center; }
        
        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #444; margin-bottom: 10px; }
        
        textarea, input { 
            width: 100%; background: var(--input-bg); border: 1px solid var(--border); 
            padding: 15px; color: #fff; font-family: "SF Mono", "Consolas", monospace; 
            font-size: 14px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        textarea:focus, input:focus { border-color: #444; background: #151515; }
        textarea { height: 200px; resize: none; line-height: 1.6; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Кнопка */
        .btn-seal { 
            width: 100%; background: var(--accent); color: #000; padding: 20px; 
            border: none; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 4px; cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-seal:hover { background: #000; color: #fff; box-shadow: 0 0 0 1px #fff; }

        .grid-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: 1; pointer-events: none; }
        
        .footer-bar { height: 45px; border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 25px; font-size: 9px; color: #333; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="console-wrapper">
        <div class="top-bar">
            <a href="index.html" class="logo-section">
                <img src="https://tvevt.com/favicon.png" alt="TVEVT" class="logo-img">
                <span class="brand-name">TVEVT | SEAL TERMINAL</span>
            </a>
            <div style="font-size: 9px; color: #222; letter-spacing: 1px;">SECURE CONNECTION // ENCRYPTED</div>
        </div>
        
        <div class="main-content">
            <div class="grid-bg"></div>
            <div class="terminal-box">
                <h2>Strategic Signal Entry</h2>
                
                <div class="input-group">
                    <label>Statement / Protocol Text</label>
                    <textarea placeholder="Write the exact statement you want to seal..."></textarea>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Your ID (Email)</label>
                        <input type="email" placeholder="author@company.com">
                    </div>
                    <div class="input-group">
                        <label>Recipient ID (Email)</label>
                        <input type="email" placeholder="partner@client.com">
                    </div>
                </div>

                <button class="btn-seal">[ SEAL & TRANSMIT ]</button>
            </div>
        </div>
        
        <div class="footer-bar">
            Transmission Protocol Active • Ready for input
        </div>
    </div>
</body>
</html>
