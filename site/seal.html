<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TVEVT | Governance Console</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/tvevt-favicon.svg" />
  <style>
    :root{ --bg:#080808; --panel:#0d0d0d; --border:rgba(255,255,255,0.1); --text:#ffffff; --accent:#ff7a00; --muted:#888; }
    *{box-sizing:border-box}
    body{ margin:0; background:#080808; color:var(--text); font-family:'Inter', sans-serif; display:flex; height:100vh; overflow:hidden; }
    .console{ flex:1; display:flex; flex-direction:column; border:1px solid var(--border); margin:20px; border-radius:12px; background:var(--panel); }
    header{ height:80px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; padding:0 35px; }
    .brand{ display:flex; align-items:center; gap:16px; text-decoration:none; color:#fff; }
    .brand img{ width:38px; height:38px; }
    .console-title { font-size:17px; font-weight:800; letter-spacing:4px; }
    .console-sub { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--accent); }
    
    .main-ui{ flex:1; display:flex; justify-content:center; align-items:center; padding:40px; overflow-y:auto; }
    .terminal{ width:100%; max-width:750px; }
    
    label{ display:block; font-size:10px; text-transform:uppercase; letter-spacing:2px; color:#aaa; margin-bottom:12px; font-weight:600; }
    textarea, input { 
      width:100%; background:#000; border:1px solid #333; 
      padding:22px; color:#fff; font-family:monospace; 
      font-size:15px; margin-bottom:30px; outline:none; border-radius:4px;
    }
    textarea:focus, input:focus { border-color: var(--accent); }
    textarea{ height:260px; resize:none; }
    
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:30px; }
    .btn{ 
      width:100%; background:#fff; color:#000; padding:24px; border:none; 
      font-weight:800; text-transform:uppercase; letter-spacing:5px; cursor:pointer; 
    }
    .btn:hover{ background:var(--accent); color:#fff; }
    footer{ height:50px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; color:#444; letter-spacing:3px; text-transform:uppercase; }
  </style>
</head>
<body>
  <div class="console">
    <header>
      <a href="index.html" class="brand">
        <img src="assets/brand/tvevt-favicon.svg" alt="TVEVT">
        <div>
          <div class="console-title">TVEVT</div>
          <div class="console-sub">Governance Console</div>
        </div>
      </a>
      <div style="font-size:10px; color:var(--accent);">PROTOCOL ACTIVE</div>
    </header>
    <div class="main-ui">
      <div class="terminal">
        <label>Strategic Signal Content</label>
        <textarea id="signalText" placeholder="Enter the text of your protocol..."></textarea>
        <div class="grid">
          <div><label>Originator Email</label><input type="email" id="fromEmail" placeholder="you@company.com"></div>
          <div><label>Recipient Email</label><input type="email" id="toEmail" placeholder="partner@company.com"></div>
        </div>
        <button class="btn" onclick="sealSignal()">SEAL & TRANSMIT</button>
      </div>
    </div>
    <footer>Verified Organizational Signals Protocol</footer>
  </div>

  <script>
    function sealSignal() {
      const text = document.getElementById('signalText').value;
      if(!text) { alert('Please enter some text'); return; }
      alert('Signal Sealed! (Интеграция с базой данных в процессе)');
      // Здесь позже добавим реальную отправку
    }
  </script>
</body>
</html>
