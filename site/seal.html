<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVEVT | Запечатать слово</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { max-width: 600px; width: 90%; text-align: center; border: 1px solid #333; padding: 40px; border-radius: 12px; background: #0a0a0a; }
        h1 { font-weight: 300; letter-spacing: -1px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        textarea { width: 100%; height: 150px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; padding: 15px; font-size: 16px; resize: none; box-sizing: border-box; outline: none; }
        textarea:focus { border-color: #555; }
        .btn { background: #fff; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn:hover { background: #ccc; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Say it once. Prove it forever.</h1>
        <p>Ваше сообщение будет зафиксировано навсегда. Изменение невозможно.</p>
        <textarea id="msg" placeholder="Введите текст, который хотите запечатать..."></textarea>
        <button class="btn" onclick="sealIt()">[ Seal Record ]</button>
    </div>

    <script>
        function sealIt() {
            const text = document.getElementById('msg').value;
            if(!text) return alert('Сначала введите текст.');
            if(confirm('Внимание: это действие необратимо. Текст будет зафиксирован в реестре TVEVT. Продолжить?')) {
                alert('Готово! (В следующем шаге мы подключим базу данных Supabase)');
            }
        }
    </script>
</body>
</html>
