<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TVEVT — Seal Signal</title>
  <link rel="icon" type="image/svg+xml" href="/tvevt-favicon.svg">

  <style>
    :root{--bg:#07090c;--text:#f4f6f8;--muted:rgba(244,246,248,.56);--soft:rgba(244,246,248,.34);--line:rgba(255,255,255,.12);--orange:#ff7a1a;--orange2:#ffb14a;--green:#8ff0b1;--radius:24px}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0%,rgba(255,122,26,.13),transparent 32%),linear-gradient(180deg,#10131a,#07090c);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Arial,sans-serif}
    .page{min-height:100vh;padding:34px;display:flex;flex-direction:column}
    header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:28px}
    .brand{display:flex;align-items:center;gap:14px;color:var(--text);text-decoration:none}
    .brand img{width:42px}
    .brand strong{letter-spacing:.16em}
    .brand span span{display:block;margin-top:4px;color:var(--muted);font-size:11px;text-transform:uppercase}

    main{width:min(900px,100%);margin:54px auto 0}

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(10,13,18,.72);
      padding:30px;
    }

    textarea{
      width:100%;
      min-height:300px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      color:var(--text);
      padding:20px;
      font-size:18px;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:20px;
    }

    button{
      min-height:54px;
      border-radius:999px;
      padding:0 20px;
      border:1px solid var(--line);
      font-weight:800;
      text-transform:uppercase;
      cursor:pointer;
    }

    .primary{
      flex:1;
      background:linear-gradient(135deg,var(--orange2),var(--orange));
      color:#170900;
    }

    .secondary{
      background:rgba(255,255,255,.05);
      color:var(--text);
    }

    .msg{
      margin-top:12px;
      color:var(--green);
      font-weight:700;
      min-height:20px;
    }

    .result{
      display:none;
      margin-top:24px;
      padding:20px;
      border-radius:16px;
      background:rgba(143,240,177,.08);
      border:1px solid rgba(143,240,177,.25);
    }

    .field{
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      background:rgba(0,0,0,.2);
      border:1px solid var(--line);
    }

    .actions-row{
      margin-top:16px;
      display:flex;
      gap:10px;
    }
  </style>
</head>

<body>

<div class="page">

<header>
  <a class="brand" href="/">
    <img src="/assets/brand/tvevt-icon.svg">
    <span><strong>TVEVT</strong><span>Console</span></span>
  </a>
</header>

<main>

<div class="panel">

<form id="form">

<textarea id="text" placeholder="Enter statement..." required></textarea>

<div class="actions">
  <button class="primary" id="btn">Seal Signal</button>
  <button class="secondary" type="button" id="clear">Clear</button>
</div>

<div class="msg" id="msg"></div>

</form>

<div class="result" id="result">

<div class="field"><b id="rid"></b></div>
<div class="field"><b id="ts"></b></div>
<div class="field"><b id="hash"></b></div>
<div class="field"><b id="link"></b></div>

<div class="actions-row">
  <a class="secondary" id="open" href="#">Open</a>
  <button class="secondary" id="copy">Copy Link</button>
</div>

</div>

</div>

</main>
</div>

<script>

const form = document.getElementById("form");
const text = document.getElementById("text");
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");

const result = document.getElementById("result");
const rid = document.getElementById("rid");
const ts = document.getElementById("ts");
const hash = document.getElementById("hash");
const link = document.getElementById("link");
const openBtn = document.getElementById("open");
const copyBtn = document.getElementById("copy");

let currentLink = "";

form.onsubmit = async (e) => {
  e.preventDefault();

  btn.disabled = true;
  btn.textContent = "Sealing...";
  msg.textContent = "Creating record...";

  try {
    const r = await fetch("/publish", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({text: text.value})
    });

    const d = await r.json();

    currentLink = d.verification_url;

    rid.textContent = "ID: " + d.id;
    ts.textContent = "Time: " + d.timestamp;
    hash.textContent = "Hash: " + d.hash;
    link.textContent = currentLink;
    openBtn.href = currentLink;

    result.style.display = "block";
    msg.textContent = "Signal sealed.";

  } catch(err){
    msg.textContent = "Error.";
  }

  btn.disabled = false;
  btn.textContent = "Seal Signal";
};

document.getElementById("clear").onclick = () => {
  text.value = "";
  result.style.display = "none";
  msg.textContent = "";
};

copyBtn.onclick = async () => {
  if(!currentLink) return;

  await navigator.clipboard.writeText(currentLink);

  msg.textContent = "Copied ✓";

  const original = copyBtn.textContent;
  copyBtn.textContent = "Copied ✓";

  setTimeout(()=>{
    copyBtn.textContent = original;
  },1500);
};

</script>

</body>
</html>
