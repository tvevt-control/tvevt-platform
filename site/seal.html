<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Signal — TVEVT</title>
<link rel="icon" href="/assets/brand/tvevt-favicon.svg" type="image/svg+xml">

<style>
:root{
  --bg:#09090b;
  --panel:#141416;
  --line:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:#a7a7ad;
  --orange:#ff9b3d;
  --green:#2cff9a;
}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,155,61,.16), transparent 32%),
    var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}
.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:40px 24px 80px;
}
.hero,.panel,.result{
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(20,20,22,.88);
  padding:24px;
}
h1{margin:0 0 12px;font-size:40px}
p{color:var(--muted);line-height:1.6}
textarea{
  width:100%;
  min-height:300px;
  margin-top:20px;
  padding:18px;
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:#fff;
  font:inherit;
  font-size:18px;
}
.actions{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
button,.btn{
  padding:13px 16px;
  border-radius:14px;
  border:0;
  background:var(--orange);
  color:#000;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
}
.secondary{
  background:transparent;
  color:#fff;
  border:1px solid var(--line);
}
.result{
  display:none;
  margin-top:20px;
  border-color:rgba(44,255,154,.35);
}
.result.show{display:block}
.field{
  margin-top:10px;
  padding:12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:rgba(0,0,0,.18);
  word-break:break-all;
}
small{display:block;color:var(--muted);margin-bottom:5px}
.msg{margin-top:12px;color:var(--green);font-weight:800}
</style>
</head>

<body>

<script src="/assets/private-nav.js?v=2026-05-04"></script>

<div class="wrap">

  <section class="hero">
    <h1>Create Signal</h1>
    <p>Create and seal a private TVEVT signal. It will be saved to your Signals library and Execution Log.</p>
  </section>

  <section class="panel" style="margin-top:20px">
    <form id="form">
      <textarea id="text" placeholder="Enter the exact statement you want to seal..." required></textarea>

      <div class="actions">
        <button id="sealBtn" type="submit">Seal Signal</button>
        <button id="clearBtn" class="secondary" type="button">Clear</button>
      </div>

      <div id="msg" class="msg"></div>
    </form>

    <div id="result" class="result">
      <h2>Signal sealed</h2>
      <div class="field"><small>Record ID</small><b id="recordId">—</b></div>
      <div class="field"><small>Timestamp</small><b id="timestamp">—</b></div>
      <div class="field"><small>Hash</small><b id="hash">—</b></div>

      <div class="actions">
        <a id="openSignals" class="btn secondary" href="/signals.html">Open Signals</a>
        <a id="openLog" class="btn" href="/execution-log.html">Open Execution Log</a>
      </div>
    </div>
  </section>

</div>

<script>
const params = new URLSearchParams(window.location.search);
let key = params.get("key") || localStorage.getItem("tvevt_client_key") || "";

const form = document.getElementById("form");
const text = document.getElementById("text");
const sealBtn = document.getElementById("sealBtn");
const clearBtn = document.getElementById("clearBtn");
const msg = document.getElementById("msg");
const result = document.getElementById("result");

const recordId = document.getElementById("recordId");
const timestamp = document.getElementById("timestamp");
const hashEl = document.getElementById("hash");
const openSignals = document.getElementById("openSignals");
const openLog = document.getElementById("openLog");

function withKey(path){
  return key ? path + "?key=" + encodeURIComponent(key) : path;
}

function makeId(prefix){
  return prefix + "-" + Math.random().toString(36).substring(2,10).toUpperCase();
}

async function sha256(value){
  const encoded = new TextEncoder().encode(value);
  const buffer = await crypto.subtle.digest("SHA-256", encoded);
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function getSignals(){
  return JSON.parse(localStorage.getItem("tvevt_signals_" + key) || "[]");
}

function saveSignals(items){
  localStorage.setItem("tvevt_signals_" + key, JSON.stringify(items));
}

function getLogs(){
  return JSON.parse(localStorage.getItem("tvevt_logs_" + key) || "[]");
}

function saveLogs(items){
  localStorage.setItem("tvevt_logs_" + key, JSON.stringify(items));
}

if(key){
  localStorage.setItem("tvevt_client_key", key);
  openSignals.href = withKey("/signals.html");
  openLog.href = withKey("/execution-log.html");
}

form.addEventListener("submit", async function(e){
  e.preventDefault();

  if(!key){
    msg.textContent = "No private access key found. Open Console from your email link.";
    return;
  }

  const signalText = text.value.trim();
  if(!signalText){
    msg.textContent = "Enter a signal before sealing.";
    return;
  }

  sealBtn.disabled = true;
  sealBtn.textContent = "Sealing...";
  msg.textContent = "Creating signal record...";

  try{
    const now = new Date().toISOString();
    const id = makeId("SIG");
    const hash = await sha256(JSON.stringify({ id, key, text: signalText, time: now }));

    const signal = {
      id,
      text: signalText,
      status: "sealed",
      hash,
      time: now,
      createdAt: now,
      clientKey: key
    };

    const signals = getSignals();
    signals.push(signal);
    saveSignals(signals);

    const logs = getLogs();
    logs.push({
      id: makeId("LOG"),
      signalId: id,
      time: now,
      text: "Signal sealed and added to private signal library.",
      status: "sent",
      hash
    });
    saveLogs(logs);

    recordId.textContent = id;
    timestamp.textContent = now;
    hashEl.textContent = hash;

    result.classList.add("show");
    msg.textContent = "Signal sealed ✓ Saved to Signals and Execution Log.";

  }catch(err){
    msg.textContent = "Unable to seal signal.";
  }finally{
    sealBtn.disabled = false;
    sealBtn.textContent = "Seal Signal";
  }
});

clearBtn.onclick = function(){
  text.value = "";
  msg.textContent = "";
  result.classList.remove("show");
};
</script>

</body>
</html>
