<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request Access — TVEVT</title>
<style>
body{margin:0;background:#0b0b0c;color:#fff;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.box{width:100%;max-width:460px;padding:34px;background:#141416;border:1px solid rgba(255,255,255,.12);border-radius:24px}
h1{margin:0 0 12px;font-size:42px}
p{color:#aaa}
input{width:100%;box-sizing:border-box;padding:15px;margin-top:12px;border-radius:12px;border:1px solid #333;background:#0b0b0c;color:#fff;font-size:16px}
button{width:100%;margin-top:18px;padding:16px;border:none;border-radius:14px;background:#ff9b3d;color:#000;font-weight:800;cursor:pointer}
button:disabled{opacity:.6;cursor:not-allowed}
.status{margin-top:14px;color:#00ff99}
.links a{display:block;margin-top:10px;color:#ff9b3d;text-decoration:none}
</style>
</head>
<body>

<div class="box">
  <h1>Request Access</h1>
  <p>Private console access requires approval.</p>

  <input id="name" placeholder="Your name">
  <input id="email" placeholder="Email">

  <button id="btn" onclick="send()">Request Access</button>

  <div id="status" class="status"></div>
  <div id="links" class="links"></div>
</div>

<script>
async function send(){
  const btn=document.getElementById("btn");
  const status=document.getElementById("status");
  const links=document.getElementById("links");

  const name=document.getElementById("name").value.trim();
  const email=document.getElementById("email").value.trim();

  if(!name || !email){
    status.innerText="Fill all fields";
    return;
  }

  btn.disabled=true;
  btn.innerText="Sending...";
  status.innerText="";
  links.innerHTML="";

  try{
    const res=await fetch("/api/leads",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name,email})
    });

    if(res.ok){
      btn.innerText="Request sent ✓";
      status.innerText="We received your request.";

      links.innerHTML=`
        <a href="/">Go to Home</a>
        <a href="mailto:${email}">Check Email</a>
      `;
      return;
    }

    btn.disabled=false;
    btn.innerText="Try again";
    status.innerText="Error sending request";

  }catch(e){
    btn.disabled=false;
    btn.innerText="Try again";
    status.innerText="Network error";
  }
}
</script>

</body>
</html>
