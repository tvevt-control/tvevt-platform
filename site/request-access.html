<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request Access — TVEVT</title>

<style>
body{
  margin:0;
  background:#0b0b0c;
  color:#fff;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:100%;
  max-width:420px;
  padding:30px;
  background:#141416;
  border-radius:12px;
}

h1{
  margin-bottom:10px;
}

p{
  color:#aaa;
  font-size:14px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #333;
  background:#0b0b0c;
  color:#fff;
}

button{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#ff9b3d;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.status{
  margin-top:15px;
  font-size:14px;
  color:#00ff99;
}
</style>
</head>

<body>

<div class="box">
  <h1>Request Access</h1>
  <p>Private console access requires approval.</p>

  <input id="name" placeholder="Your name">
  <input id="email" placeholder="Email">

  <button id="btn" onclick="send()">Request Access</button>

  <div id="status" class="status"></div>
</div>

<script>
async function send() {
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name || !email) {
    status.innerText = "Fill all fields";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Sending...";

  try {
    const res = await fetch("/access-request", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, email })
    });

    if (res.ok) {
      btn.innerText = "Request sent ✓";
      status.innerText = "We received your request. Check your email soon.";
    } else {
      btn.disabled = false;
      btn.innerText = "Try again";
      status.innerText = "Error sending request";
    }

  } catch (e) {
    btn.disabled = false;
    btn.innerText = "Try again";
    status.innerText = "Network error";
  }
}
</script>

</body>
</html>
