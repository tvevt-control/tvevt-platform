<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TVEVT Console</title>
<link rel="icon" href="/assets/brand/tvevt-favicon.svg" type="image/svg+xml">

<style>
:root{
  --bg:#09090b;
  --panel:#141416;
  --line:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:#a7a7ad;
  --orange:#ff9b3d;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,155,61,.16), transparent 32%),
    var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:40px 24px 80px;
}

.hero{
  border:1px solid var(--line);
  border-radius:28px;
  padding:34px;
  background:rgba(20,20,22,.9);
}

h1{
  margin:0 0 12px;
  font-size:42px;
}

p{
  color:var(--muted);
  line-height:1.6;
}

.grid{
  margin-top:24px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.card{
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  background:rgba(20,20,22,.85);
}

.card h2{
  margin:0 0 8px;
  font-size:20px;
}

.card p{
  margin:0 0 14px;
}

.btn{
  display:inline-block;
  padding:12px 14px;
  border-radius:12px;
  background:var(--orange);
  color:#000;
  text-decoration:none;
  font-weight:900;
}

.btn.secondary{
  background:transparent;
  color:#fff;
  border:1px solid var(--line);
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<script src="/assets/private-nav.js?v=2026-05-04"></script>

<div class="wrap">

  <div class="hero">
    <h1>Signal Control</h1>
    <p>
      Create verified signals, access your private signal library,
      and manage execution records from one place.
    </p>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Create Signal</h2>
      <p>Prepare a new strategic statement.</p>
      <a class="btn" href="/seal.html">Create</a>
    </div>

    <div class="card">
      <h2>My Signals</h2>
      <p>Your private signal library.</p>
      <a class="btn secondary" href="/signals.html">Open</a>
    </div>

    <div class="card">
      <h2>Execution Log</h2>
      <p>Immutable execution records.</p>
      <a class="btn secondary" href="/execution-log.html">View</a>
    </div>
  </div>

</div>

</body>
</html>
