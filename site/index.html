<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TVEVT | Governance Console</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/tvevt-favicon.svg" />
  <style>
    :root{ --bg:#080808; --text:#ffffff; --accent:#ff7a00; --muted:#555; }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 40%, rgba(255,122,0,0.03) 0%, transparent 50%), #080808;
      display:flex; flex-direction:column;
    }
    .page{ flex:1; display:flex; flex-direction:column; padding:40px; border:1px solid rgba(255,255,255,0.05); margin:20px; border-radius:12px; }
    header{ display:flex; justify-content:space-between; align-items:flex-start; }
    .brand{ display:flex; align-items:center; gap:16px; text-decoration:none; color:#fff; }
    .brand img{ width:40px; height:40px; }
    .console-title { font-size:18px; font-weight:800; letter-spacing:4px; margin-bottom:2px; }
    .console-sub { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); }
    
    main{ flex:1; display:flex; align-items:center; justify-content:center; }
    .hero{ text-align:center; max-width:900px; }
    h1{ font-size:clamp(48px, 9vw, 96px); line-height:0.9; font-weight:600; letter-spacing:-0.03em; margin:0 0 20px 0; text-transform:uppercase; }
    .sub-hero { font-size:16px; color:#888; letter-spacing:1px; margin-bottom:50px; font-weight:300; }
    
    .cta{
      display:inline-block; padding:22px 64px; background:#fff; color:#000;
      text-decoration:none; font-size:14px; font-weight:700; letter-spacing:3px;
      text-transform:uppercase; transition:0.3s cubic-bezier(0.2, 1, 0.3, 1);
    }
    .cta:hover{ background:var(--accent); color:#fff; transform:translateY(-2px); box-shadow:0 15px 30px rgba(255,122,0,0.2); }
    
    footer{ display:flex; justify-content:space-between; align-items:center; font-size:11px; text-transform:uppercase; letter-spacing:2px; color:#444; }
    .footer-highlight { color:#777; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a href="/" class="brand">
        <img src="assets/brand/tvevt-favicon.svg" alt="TVEVT">
        <div>
          <div class="console-title">TVEVT</div>
          <div class="console-sub">Governance Console</div>
        </div>
      </a>
      <div style="font-size:10px; color:#222; letter-spacing:2px;">SECURE ACCESS // NODE_01</div>
    </header>

    <main>
      <div class="hero">
        <h1>SAY IT ONCE.<br>PROVE IT FOREVER.</h1>
        <div class="sub-hero">The immutable ledger for organizational signals and strategic records.</div>
        <a class="cta" href="seal.html">START SEALING</a>
      </div>
    </main>

    <footer>
      <div class="footer-highlight">TVEVT Infrastructure v1.0</div>
      <div>Verified Organizational Signals Protocol</div>
    </footer>
  </div>
</body>
</html>
