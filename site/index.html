<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TVEVT | Signal Terminal</title>
  <meta name="description" content="TVEVT is infrastructure for verified organizational signals." />
  <link rel="icon" type="image/svg+xml" href="/tvevt-favicon.svg" />

  <style>
    :root{
      --bg:#090909;
      --panel:#111;
      --text:#f5f5f5;
      --muted:#9b9b9b;
      --line:rgba(255,255,255,.12);
      --accent:#ff7a00;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,122,0,.08), transparent 34%),
        linear-gradient(180deg,#111 0%,#060606 100%);
      color:var(--text);
      font-family:Inter, Arial, Helvetica, sans-serif;
      letter-spacing:.02em;
    }

    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding:34px 42px;
      border:1px solid var(--line);
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      text-transform:uppercase;
      color:var(--muted);
      letter-spacing:.18em;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      color:#fff;
      font-weight:700;
    }

    .brand img{
      width:34px;
      height:34px;
      object-fit:contain;
    }

    .status{
      color:rgba(255,255,255,.35);
    }

    main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .hero{
      max-width:880px;
      padding:40px 0;
    }

    h1{
      margin:0 0 34px;
      font-size:clamp(44px,7vw,92px);
      line-height:.95;
      font-weight:500;
      letter-spacing:.02em;
    }

    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:280px;
      padding:19px 28px;
      border:1px solid rgba(255,255,255,.45);
      background:#f3f1e8;
      color:#111;
      text-decoration:none;
      font-size:13px;
      font-weight:700;
      letter-spacing:.28em;
      text-transform:uppercase;
      transition:.2s ease;
    }

    .cta:hover{
      transform:translateY(-1px);
      box-shadow:0 0 40px rgba(255,255,255,.12);
    }

    footer{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:24px;
      color:rgba(255,255,255,.35);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.18em;
    }

    footer a{
      color:rgba(255,255,255,.55);
      text-decoration:none;
    }

    footer a:hover{
      color:#fff;
    }

    .line{
      position:fixed;
      inset:22px;
      border:1px solid rgba(255,255,255,.06);
      pointer-events:none;
    }

    @media(max-width:720px){
      .page{
        padding:26px 20px;
      }

      header{
        align-items:flex-start;
        gap:20px;
      }

      .status{
        display:none;
      }

      h1{
        font-size:46px;
      }

      .cta{
        min-width:100%;
        letter-spacing:.18em;
      }

      footer{
        flex-direction:column;
        align-items:flex-start;
        font-size:10px;
      }
    }
  </style>
</head>

<body>
  <div class="line"></div>

  <div class="page">
    <header>
      <div class="brand">
        <img src="/assets/brand/tvevt-icon.svg" alt="TVEVT" onerror="this.style.display='none'">
        <span>TVEVT | TERMINAL</span>
      </div>

      <div class="status">
        System Status Active // Alpha
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>SAY IT ONCE.<br>PROVE IT FOREVER.</h1>

        <a class="cta" href="/seal.html">
          [ Open Signal Terminal ]
        </a>
      </section>
    </main>

    <footer>
      <div>Infrastructure for verified organizational signals</div>
      <a href="/vision.html">Deep Vision & Architecture →</a>
    </footer>
  </div>
</body>
</html>
