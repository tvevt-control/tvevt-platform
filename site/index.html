<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TVEVT | Signal Terminal</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/tvevt-favicon.svg" />
  <style>
    :root{ --bg:#090909; --text:#f5f5f5; --muted:rgba(255,255,255,.35); --accent:#ff7a00; }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family:Inter, -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 35%, rgba(255,122,0,.05), transparent 35%), #090909;
      display:flex; flex-direction:column;
    }
    .page{ flex:1; display:flex; flex-direction:column; padding:40px; border:1px solid rgba(255,255,255,.05); margin:15px; border-radius:12px; position:relative; }
    header{ display:flex; justify-content:space-between; align-items:center; font-size:11px; text-transform:uppercase; letter-spacing:.2em; }
    .brand{ display:flex; align-items:center; gap:12px; font-weight:700; color:#fff; text-decoration:none; }
    .brand img{ width:32px; height:32px; }
    main{ flex:1; display:flex; align-items:center; justify-content:center; text-align:center; }
    h1{ font-size:clamp(40px, 8vw, 90px); line-height:0.95; font-weight:500; letter-spacing:-0.02em; margin-bottom:40px; }
    .cta{
      display:inline-block; padding:22px 50px; background:#f3f1e8; color:#000;
      text-decoration:none; font-size:13px; font-weight:700; letter-spacing:.3em;
      text-transform:uppercase; transition:.3s;
    }
    .cta:hover{ transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,255,255,0.1); }
    footer{ display:flex; justify-content:space-between; font-size:10px; text-transform:uppercase; letter-spacing:.15em; color:var(--muted); }
    footer a{ color:inherit; text-decoration:none; transition:.3s; }
    footer a:hover{ color:#fff; }
    @media(max-width:720px){ .page{ padding:20px; margin:10px; } h1{ font-size:42px; } footer{ flex-direction:column; gap:20px; } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a href="/" class="brand">
        <img src="assets/brand/tvevt-favicon.svg" alt="TVEVT">
        <span>TVEVT | TERMINAL</span>
      </a>
      <div>SYSTEM STATUS ACTIVE // ALPHA</div>
    </header>
    <main>
      <div class="hero">
        <h1>SAY IT ONCE.<br>PROVE IT FOREVER.</h1>
        <a class="cta" href="seal.html">[ Open Signal Terminal ]</a>
      </div>
    </main>
    <footer>
      <div>Infrastructure for verified organizational signals</div>
      <a href="vision.html">Deep Vision & Architecture →</a>
    </footer>
  </div>
</body>
</html>
