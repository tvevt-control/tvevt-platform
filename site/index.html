<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TVEVT | Governance Console</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/tvevt-favicon.svg" />
  <style>
    :root{ --bg:#080808; --text:#ffffff; --accent:#ff7a00; }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 40%, rgba(255,122,0,0.02) 0%, transparent 50%), #080808;
      display:flex; flex-direction:column;
    }
    .page{ flex:1; display:flex; flex-direction:column; padding:40px; border:1px solid rgba(255,255,255,0.03); margin:20px; border-radius:12px; }
    header{ display:flex; justify-content:space-between; align-items:center; }
    .brand{ display:flex; align-items:center; gap:16px; text-decoration:none; color:#fff; }
    .brand img{ width:38px; height:38px; }
    .console-title { font-size:17px; font-weight:800; letter-spacing:4px; margin-bottom:1px; }
    .console-sub { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:#333; }
    
    main{ flex:1; display:flex; align-items:center; justify-content:center; }
    .hero{ text-align:center; max-width:900px; }
    h1{ font-size:clamp(44px, 8vw, 88px); line-height:0.92; font-weight:600; letter-spacing:-0.03em; margin:0 0 25px 0; text-transform:uppercase; }
    .sub-hero { font-size:15px; color:#555; letter-spacing:1px; margin-bottom:50px; font-weight:300; }
    
    .cta{
      display:inline-block; padding:20px 55px; background:#fff; color:#000;
      text-decoration:none; font-size:13px; font-weight:700; letter-spacing:3px;
      text-transform:uppercase; transition:0.3s ease;
    }
    .cta:hover{ background:var(--accent); color:#fff; }
    
    footer{ display:flex; justify-content:center; font-size:9px; text-transform:uppercase; letter-spacing:3px; color:#222; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a href="/" class="brand">
        <img src="assets/brand/tvevt-favicon.svg" alt="TVEVT">
        <div>
          <div class="console-title">TVEVT</div>
          <div class="console-sub">Governance Console</div>
        </div>
      </a>
      <div style="font-size:9px; color:#1a1a1a; letter-spacing:2px;">ENCRYPTED ACCESS</div>
    </header>

    <main>
      <div class="hero">
        <h1>SAY IT ONCE.<br>PROVE IT FOREVER.</h1>
        <div class="sub-hero">Universal protocol for verified organizational signals.</div>
        <a class="cta" href="seal.html">START SEALING</a>
      </div>
    </main>

    <footer>
      Verified Organizational Signals Protocol
    </footer>
  </div>
</body>
</html>
