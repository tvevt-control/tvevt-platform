<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Execution Log — TVEVT</title>
<link rel="icon" href="/assets/brand/tvevt-favicon.svg" type="image/svg+xml">

<style>
:root{
  --bg:#09090b;
  --panel:#141416;
  --line:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:#a7a7ad;
  --orange:#ff9b3d;
  --green:#2cff9a;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,155,61,.16), transparent 32%),
    var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:40px 24px 80px;
}

h1{
  margin:0 0 10px;
  font-size:40px;
}

p{
  color:var(--muted);
  line-height:1.6;
}

.hero{
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(20,20,22,.88);
  padding:24px;
}

.list{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.item{
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  background:rgba(20,20,22,.85);
}

.item small{
  display:block;
  color:var(--muted);
  margin-bottom:6px;
}

.item strong{
  display:block;
  line-height:1.4;
}

.meta{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
  word-break:break-all;
}

.status{
  display:inline-block;
  margin-top:10px;
  padding:7px 10px;
  border-radius:999px;
  color:var(--green);
  border:1px solid rgba(44,255,154,.32);
  background:rgba(44,255,154,.08);
  font-size:12px;
  font-weight:900;
}

.empty{
  margin-top:30px;
  padding:24px;
  border:1px solid var(--line);
  border-radius:20px;
  background:rgba(20,20,22,.7);
  color:var(--muted);
}
</style>
</head>

<body>

<script src="/assets/private-nav.js?v=2026-05-04"></script>

<div class="wrap">

  <section class="hero">
    <h1>Execution Log</h1>
    <p>
      Private execution records connected to your TVEVT access key.
      Every sealed signal creates an append-style local execution entry.
    </p>
  </section>

  <div id="list" class="list"></div>

  <div id="empty" class="empty" style="display:none">
    No execution records yet.
  </div>

</div>

<script>
const key = localStorage.getItem("tvevt_client_key") || "default";
const storageKey = "tvevt_logs_" + key;

const list = document.getElementById("list");
const empty = document.getElementById("empty");

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

const logs = JSON.parse(localStorage.getItem(storageKey) || "[]");

if (!logs.length) {
  empty.style.display = "block";
} else {
  logs.slice().reverse().forEach(log => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <small>${log.time ? new Date(log.time).toLocaleString() : "No timestamp"}</small>
      <strong>${escapeHtml(log.text || "Execution record")}</strong>
      <div class="meta">Log ID: ${escapeHtml(log.id || "—")}</div>
      <div class="meta">Signal ID: ${escapeHtml(log.signalId || "—")}</div>
      <div class="meta">Hash: ${escapeHtml(log.hash || "—")}</div>
      <span class="status">${escapeHtml(log.status || "recorded")}</span>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
