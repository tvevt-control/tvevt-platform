<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Execution Log — TVEVT</title>
<link rel="icon" href="/assets/brand/tvevt-favicon.svg" type="image/svg+xml">

<style>
:root{
  --bg:#09090b;
  --line:rgba(255,255,255,.12);
  --text:#ffffff;
  --muted:#a7a7ad;
  --orange:#ff9b3d;
  --green:#2cff9a;
  --red:#ff6a5f;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,155,61,.16), transparent 32%),
    var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:34px 24px 80px;
}

.modeBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:22px;
  border:1px solid rgba(44,255,154,.22);
  border-radius:20px;
  padding:16px 18px;
  background:rgba(44,255,154,.06);
}

.modeBar strong{
  display:block;
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--green);
}

.modeBar span{
  display:block;
  margin-top:5px;
  color:var(--muted);
  font-size:14px;
}

.modeActions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.topBtn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:#fff;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  text-decoration:none;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}

h1{
  margin:0 0 10px;
  font-size:40px;
  letter-spacing:-.04em;
}

p{
  color:var(--muted);
  line-height:1.6;
}

.hero,.item,.empty{
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(20,20,22,.88);
  padding:24px;
}

.list{
  margin-top:24px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.item small{
  display:block;
  color:var(--muted);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-weight:900;
  font-size:11px;
}

.item strong{
  display:block;
  line-height:1.5;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
}

.meta{
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
  word-break:break-all;
  line-height:1.5;
}

.status{
  display:inline-block;
  margin-top:12px;
  padding:7px 10px;
  border-radius:999px;
  color:var(--green);
  border:1px solid rgba(44,255,154,.32);
  background:rgba(44,255,154,.08);
  font-size:12px;
  font-weight:900;
  text-transform:uppercase;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:16px;
  flex-wrap:wrap;
}

.btn{
  padding:11px 14px;
  border-radius:12px;
  background:var(--orange);
  color:#000;
  font-weight:900;
  text-decoration:none;
  border:0;
  cursor:pointer;
  font-size:13px;
}

.btn.secondary{
  background:transparent;
  color:#fff;
  border:1px solid var(--line);
}

.empty{
  margin-top:24px;
  color:var(--muted);
}

.msg{
  margin-top:16px;
  color:var(--green);
  font-weight:800;
}

.msg.error{
  color:var(--red);
}

footer{
  margin-top:40px;
  text-align:center;
  color:rgba(255,255,255,.24);
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
}

@media(max-width:800px){
  .modeBar{
    flex-direction:column;
    align-items:flex-start;
  }

  h1{
    font-size:34px;
  }

  .btn{
    width:100%;
    text-align:center;
  }
}
</style>
</head>

<body>

<script src="/assets/private-nav.js?v=2026-05-10"></script>

<div class="wrap">

  <div class="modeBar">
    <div>
      <strong>Private Execution Log</strong>
      <span id="modeText">Loading private identity…</span>
    </div>

    <div class="modeActions">
      <a class="topBtn" id="consoleLink" href="/console.html">Console</a>
      <a class="topBtn" id="signalsLink" href="/signals.html">Signals</a>
      <a class="topBtn" id="createLink" href="/seal.html">Create Signal</a>
      <a class="topBtn" href="/">Public Site</a>
    </div>
  </div>

  <section class="hero">
    <h1>Execution Log</h1>

    <p>
      Private execution records connected to your TVEVT access key.
      Each sealed signal appears as a verified execution event.
    </p>

    <div id="msg" class="msg"></div>
  </section>

  <div id="list" class="list"></div>

  <div id="empty" class="empty" style="display:none">
    No execution records found yet.
  </div>

  <footer>
    Say it once. Prove it forever.
  </footer>

</div>

<script>
const params = new URLSearchParams(window.location.search);

let key =
  params.get("key") ||
  localStorage.getItem("tvevt_client_key") ||
  "";

const list = document.getElementById("list");
const empty = document.getElementById("empty");
const msg = document.getElementById("msg");

const modeText =
  document.getElementById("modeText");

const consoleLink =
  document.getElementById("consoleLink");

const signalsLink =
  document.getElementById("signalsLink");

const createLink =
  document.getElementById("createLink");

function withKey(path){
  return key
    ? path + "?key=" + encodeURIComponent(key)
    : path;
}

function formatDate(value){

  if(!value) return "—";

  try{
    return new Date(value)
      .toLocaleString();
  }catch{
    return value;
  }
}

function setMessage(
  text,
  error = false
){
  msg.textContent = text || "";
  msg.classList.toggle(
    "error",
    error
  );
}

function applyMode(){

  if(key){

    localStorage.setItem(
      "tvevt_client_key",
      key
    );

    modeText.textContent =
      "Private identity active on this device.";

    consoleLink.href =
      withKey("/console.html");

    signalsLink.href =
      withKey("/signals.html");

    createLink.href =
      withKey("/seal.html");

  }else{

    modeText.textContent =
      "No private identity found.";

    consoleLink.href =
      "/request-access.html";

    consoleLink.textContent =
      "Request Access";

    signalsLink.href =
      "/request-access.html";

    createLink.href =
      "/seal.html";
  }
}

function normalizeLogs(data){

  if(Array.isArray(data))
    return data;

  if(Array.isArray(data.logs))
    return data.logs;

  if(Array.isArray(data.events))
    return data.events;

  return [];
}

async function loadFromApi(){

  const response =
    await fetch(
      "/api/execution-log?key=" +
      encodeURIComponent(key)
    );

  const data =
    await response.json();

  if(
    !response.ok ||
    data.ok === false
  ){
    throw new Error(
      data.error ||
      "Unable to load execution log."
    );
  }

  return normalizeLogs(data);
}

function loadLocalFallback(){

  const storageKey =
    "tvevt_logs_" +
    (key || "default");

  return JSON.parse(
    localStorage.getItem(storageKey)
    || "[]"
  );
}

function saveLocalFallback(logs){

  if(
    !key ||
    !Array.isArray(logs)
  ){
    return;
  }

  const limited =
    logs.slice(0, 50);

  localStorage.setItem(
    "tvevt_logs_" + key,
    JSON.stringify(limited)
  );
}

function render(logs){

  list.innerHTML = "";

  if(!logs.length){

    empty.style.display =
      "block";

    return;
  }

  empty.style.display =
    "none";

  logs
    .slice()
    .reverse()
    .forEach(log => {

      const id =
        log.id || "—";

      const signalId =
        log.signalId || "—";

      const event =
        log.event ||
        "SIGNAL_EVENT";

      const time =
        log.time ||
        log.createdAt ||
        log.timestamp ||
        "";

      const text =
        log.text ||
        "Signal sealed and verified record created.";

      const status =
        log.status ||
        "recorded";

      const hash =
        log.hash || "—";

      const visibility =
        log.visibility ||
        "private";

      const recordUrl =
        log.recordUrl ||
        log.verification_url ||
        (
          signalId !== "—"
            ? "/record.html?id=" +
              encodeURIComponent(signalId)
            : "#"
        );

      const div =
        document.createElement("div");

      div.className =
        "item";

      const label =
        document.createElement("small");

      label.textContent =
        `${id} · ${formatDate(time)}`;

      const title =
        document.createElement("strong");

      title.textContent =
        text;

      const metaEvent =
        document.createElement("div");

      metaEvent.className =
        "meta";

      metaEvent.textContent =
        `Event: ${event}`;

      const meta1 =
        document.createElement("div");

      meta1.className =
        "meta";

      meta1.textContent =
        `Signal ID: ${signalId}`;

      const meta2 =
        document.createElement("div");

      meta2.className =
        "meta";

      meta2.textContent =
        `Hash: ${hash}`;

      const meta3 =
        document.createElement("div");

      meta3.className =
        "meta";

      meta3.textContent =
        `Visibility: ${visibility}`;

      const badge =
        document.createElement("span");

      badge.className =
        "status";

      badge.textContent =
        status;

      const actions =
        document.createElement("div");

      actions.className =
        "actions";

      const open =
        document.createElement("a");

      open.className =
        "btn";

      open.href =
        recordUrl;

      open.textContent =
        "Open Record";

      const copy =
        document.createElement("button");

      copy.className =
        "btn secondary";

      copy.type =
        "button";

      copy.textContent =
        "Copy Link";

      copy.onclick =
        async () => {

          const full =
            recordUrl.startsWith("http")
              ? recordUrl
              : (
                  window.location.origin +
                  recordUrl
                );

          await navigator.clipboard
            .writeText(full);

          setMessage(
            "Verification link copied."
          );
        };

      actions.appendChild(open);
      actions.appendChild(copy);

      div.appendChild(label);
      div.appendChild(title);
      div.appendChild(metaEvent);
      div.appendChild(meta1);
      div.appendChild(meta2);
      div.appendChild(meta3);
      div.appendChild(badge);
      div.appendChild(actions);

      list.appendChild(div);
    });
}

async function init(){

  applyMode();

  if(!key){

    empty.style.display =
      "block";

    setMessage(
      "Private access is required to load your execution log.",
      true
    );

    return;
  }

  setMessage(
    "Loading private execution log…"
  );

  try{

    const logs =
      await loadFromApi();

    saveLocalFallback(logs);

    render(logs);

    setMessage(
      "Execution log loaded."
    );

  }catch(err){

    console.error(err);

    const fallback =
      loadLocalFallback();

    if(fallback.length){

      render(fallback);

      setMessage(
        "Loaded local fallback execution log."
      );

    }else{

      render([]);

      setMessage(
        "No private execution records found yet."
      );
    }
  }
}

init();
</script>

</body>
</html>
