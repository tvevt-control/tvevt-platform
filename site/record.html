<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TVEVT | Signal Records</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/tvevt-favicon.svg" />
  <style>
    :root{ --bg:#080808; --panel:#0d0d0d; --border:rgba(255,255,255,0.1); --text:#ffffff; --accent:#ff7a00; }
    *{box-sizing:border-box}
    body{ margin:0; background:#080808; color:var(--text); font-family:'Inter', sans-serif; display:flex; height:100vh; overflow:hidden; }
    .console{ flex:1; display:flex; flex-direction:column; border:1px solid var(--border); margin:20px; border-radius:12px; background:var(--panel); }
    header{ height:80px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; padding:0 35px; }
    .brand{ display:flex; align-items:center; gap:16px; text-decoration:none; color:#fff; }
    .brand img{ width:38px; height:38px; }
    
    .main-ui{ flex:1; padding:40px; overflow-y:auto; }
    .records-list { max-width:900px; margin:0 auto; }
    .record-card { 
      background:#000; border:1px solid #222; padding:25px; 
      margin-bottom:20px; border-radius:8px; display:flex; 
      justify-content:space-between; align-items:center;
      transition: 0.3s;
    }
    .record-card:hover { border-color: var(--accent); }
    .record-info { display:flex; flex-direction:column; gap:8px; }
    .record-date { font-size:10px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; }
    .record-text { font-size:15px; font-weight:500; color:#eee; }
    .record-meta { font-size:11px; color:#555; }
    
    .status-tag { 
      font-size:10px; padding:6px 12px; border:1px solid #333; 
      color:#aaa; border-radius:4px; text-transform:uppercase; letter-spacing:1px;
    }
    footer{ height:50px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; color:#444; letter-spacing:3px; text-transform:uppercase; }
  </style>
</head>
<body>
  <div class="console">
    <header>
      <a href="index.html" class="brand">
        <img src="assets/brand/tvevt-favicon.svg" alt="TVEVT">
        <div style="font-size:17px; font-weight:800; letter-spacing:4px;">RECORDS</div>
      </a>
      <a href="seal.html" style="color:#fff; text-decoration:none; font-size:11px; border:1px solid #333; padding:8px 15px; border-radius:4px;">+ NEW SIGNAL</a>
    </header>
    <div class="main-ui">
      <div class="records-list">
        <div class="record-card">
          <div class="record-info">
            <div class="record-date">April 26, 2026 // 13:45</div>
            <div class="record-text">Board Decision: Q2 Strategic Pivot</div>
            <div class="record-meta">Origin: m.mikhailov@company.com • Sent to: partner@inc.com</div>
          </div>
          <div class="status-tag">Verified</div>
        </div>
        </div>
    </div>
    <footer>Immutable Organizational Records Archive</footer>
  </div>
</body>
</html>
